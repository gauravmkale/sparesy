<div class="flex items-center justify-start min-h-screen w-full px-40">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-container space-y-8">

        <h2 class="text-4xl font-medium text-white">Lets sign you in</h2>

        <div class="form-group flex flex-col">
            <label class="text-gray-400">Email</label>
            <input type="email" formControlName="email" placeholder="Enter your email"
                class="w-full border border-gray-700 bg-[#1a1a1a] text-white p-2 rounded-xl w-lg placeholder-gray-500 focus:outline-none focus:border-teal-500" />

            <div class="error" *ngIf="loginForm.controls['email'].touched && loginForm.controls['email'].invalid">
                <small *ngIf="loginForm.controls['email'].errors?.['required']">
                    Email is required
                </small>
                <small *ngIf="loginForm.controls['email'].errors?.['email']">
                    Enter a valid email
                </small>
            </div>

        </div>

        <div class="form-group flex flex-col">
            <label class="text-gray-400">Password</label>
            <input type="password" formControlName="password" placeholder="Enter your password"
                class="w-full border border-gray-700 bg-[#1a1a1a] text-white p-2 rounded-xl w-lg placeholder-gray-500 focus:outline-none focus:border-teal-500" />

            <div class="error" *ngIf="loginForm.controls['password'].touched && loginForm.controls['password'].invalid">
                <small>Password is required</small>
            </div>

        </div>

        <button type="submit" [disabled]="loginForm.invalid"
            class="bg-white text-black font-semibold py-2 rounded-xl hover:bg-gray-200 transition disabled:opacity-40 disabled:cursor-not-allowed">
            Login
        </button>

        <p class="register-link text-gray-500">
            Don't have an account?
            <a routerLink="/register" class="text-teal-400 hover:underline">Register!</a>
        </p>

    </form>
</div>
