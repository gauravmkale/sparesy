#Port this service runs on
server.port = 8081

#MySQL username and password depending on machines and make sure database is alredy created.
spring.datasource.url=jdbc:mysql://localhost:3306/sparesy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password = password


#Hibernate will auto map tables to db.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT config
# This secret key is used to sign and verify tokens
# Keep it the same across both services or tokens won't validate
jwt.secret=sparesy-super-secret-key-for-jwt-signing-2026
jwt.expiration=86400000

springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/api-docs