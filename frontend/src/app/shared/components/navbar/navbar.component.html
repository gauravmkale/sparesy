<nav class="w-full px-6 py-4 bg-[#111111] border-b border-gray-800 flex items-center justify-between">
    <a routerLink="/" class="text-2xl font-bold tracking-tight text-white">
        Sparesy
    </a>

    <!-- Logged OUT -->
    <div *ngIf="!isLoggedIn" class="flex items-center gap-6 text-sm font-medium text-gray-400">
        <a routerLink="/auth/login" routerLinkActive="text-white" class="hover:text-white transition">Login</a>
        <a routerLink="/auth/register" routerLinkActive="text-white" class="hover:text-white transition">Register</a>
    </div>

    <!-- Logged IN -->
    <div *ngIf="isLoggedIn" class="flex items-center gap-5 text-sm font-medium">
        <span
            class="px-2.5 py-1 rounded-lg bg-teal-500/15 text-teal-400 text-xs font-semibold uppercase tracking-wider">
            {{ roleBadge }}
        </span>
        <a [routerLink]="dashboardRoute" routerLinkActive="text-white"
            class="text-gray-400 hover:text-white transition">Dashboard</a>
        <button (click)="logout()" class="text-gray-400 hover:text-red-400 transition cursor-pointer">Logout</button>
    </div>
</nav>
