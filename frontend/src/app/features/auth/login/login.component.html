<div class="flex items-center justify-center min-h-screen w-full px-6">
    <div class="w-full max-w-md">

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()"
            class="relative border border-gray-800 bg-[#111111]/80 backdrop-blur-xl rounded-2xl p-8 shadow-2xl shadow-black/40 space-y-6">

            <div>
                <h2 class="text-2xl font-semibold text-white">Welcome back</h2>
                <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
            </div>

            <!-- Email -->
            <div class="space-y-1">
                <label class="text-xs font-medium text-gray-400 uppercase tracking-wider">Email</label>
                <input type="email" formControlName="email" placeholder="you@company.com"
                    class="w-full border border-gray-700/50 bg-white/[0.04] text-white px-4 py-2.5 rounded-xl placeholder-gray-600 focus:outline-none focus:border-teal-500/70 focus:bg-white/[0.06] transition-all duration-200" />
                <div *ngIf="loginForm.controls['email'].touched && loginForm.controls['email'].invalid">
                    <p class="text-red-400 text-xs mt-1">
                        <span *ngIf="loginForm.controls['email'].errors?.['required']">Email is required</span>
                        <span *ngIf="loginForm.controls['email'].errors?.['email']">Enter a valid email address</span>
                    </p>
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-1">
                <label class="text-xs font-medium text-gray-400 uppercase tracking-wider">Password</label>
                <input type="password" formControlName="password" placeholder="Enter your password"
                    class="w-full border border-gray-700/50 bg-white/[0.04] text-white px-4 py-2.5 rounded-xl placeholder-gray-600 focus:outline-none focus:border-teal-500/70 focus:bg-white/[0.06] transition-all duration-200" />
                <div *ngIf="loginForm.controls['password'].touched && loginForm.controls['password'].invalid">
                    <p class="text-red-400 text-xs mt-1">Password is required</p>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" [disabled]="loginForm.invalid || isLoading()"
                class="w-full bg-teal-500 text-white font-semibold py-2.5 rounded-xl hover:bg-teal-400 transition-all duration-200 text-sm shadow-lg shadow-teal-500/20 hover:shadow-teal-500/40 disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none flex justify-center items-center gap-2">
                <span *ngIf="isLoading()" class="h-4 w-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                {{ isLoading() ? 'Signing in...' : 'Sign In' }}
            </button>

            <p class="text-gray-600 text-sm text-center">
                Don't have an account?
                <a routerLink="/auth/register"
                    class="text-teal-400 hover:text-teal-300 hover:underline transition-colors">Register</a>
            </p>

        </form>
    </div>
</div>
